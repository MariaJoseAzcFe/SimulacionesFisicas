<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis de Coste Computacional - Problema 1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .controls { margin-bottom: 30px; text-align: center; border: 2px dashed #bdc3c7; padding: 20px; border-radius: 8px; }
        canvas { max-width: 100%; height: 500px !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Coste de Simulación vs Nº de Partículas</h2>
    <p class="subtitle">Análisis de promedios para evitar solapamiento de datos</p>
    
    <div class="controls">
        <input type="file" id="csvFile" accept=".csv">
        <p><small>Sube tu archivo <b>p1data.csv</b> o <b>p3data.csv</b> para ver la curva de complejidad.</small></p>
    </div>
    
    <canvas id="myChart"></canvas>
</div>

<script>
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            processData(event.target.result);
        };
        reader.readAsText(file);
    });

    function processData(csvText) {
        const lines = csvText.split('\n');
        const groups = {}; // Objeto para agrupar por número de partículas

        // Procesar líneas saltando la cabecera
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if (cols.length >= 3) {
                const n = parseInt(cols[1]);      // Nº partículas
                const tSim = parseFloat(cols[2]);   // Tiempo (ms)
                
                if (!isNaN(n) && !isNaN(tSim)) {
                    if (!groups[n]) {
                        groups[n] = { sum: 0, count: 0 };
                    }
                    groups[n].sum += tSim;
                    groups[n].count += 1;
                }
            }
        }

        // Calcular el promedio para cada N
        const averagedPoints = Object.keys(groups).map(n => {
            return {
                x: parseInt(n),
                y: groups[n].sum / groups[n].count
            };
        });

        // Ordenar por eje X para que la línea no haga zigzag
        averagedPoints.sort((a, b) => a.x - b.x);

        renderChart(averagedPoints);
    }

    function renderChart(dataPoints) {
        const ctx = document.getElementById('myChart').getContext('2d');
        
        if (window.simChart) { window.simChart.destroy(); }

        window.simChart = new Chart(ctx, {
            type: 'line', // Usamos line para que se vea la curva de complejidad
            data: {
                datasets: [{
                    label: 'Tiempo promedio de simulación (ms)',
                    data: dataPoints,
                    backgroundColor: 'rgba(52, 152, 219, 0.2)',
                    borderColor: 'rgba(41, 128, 185, 1)',
                    borderWidth: 3,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    fill: true,
                    tension: 0.1 // Suaviza un poco la línea
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: {
                        type: 'linear',
                        title: { display: true, text: 'Número de Partículas (N)', font: { size: 14, weight: 'bold' } },
                        min: 0
                    },
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: 'Tiempo Promedio Tsim (ms)', font: { size: 14, weight: 'bold' } }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `N: ${context.parsed.x} | T_avg: ${context.parsed.y.toFixed(2)} ms`;
                            }
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
